<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div class="login-wrap">
    <p class="login-title" id="siteTitle">Blog Admin</p>
    <p class="login-desc">
      GitHub Personal Access Token을 입력하세요.<br>
      토큰에는 <code>repo</code> 또는 <code>contents:write</code> 권한이 필요합니다.
    </p>

    <div id="msg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="token">GitHub Personal Access Token</label>
        <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="current-password" required>
        <p class="field-hint">
          <a href="https://github.com/settings/tokens/new?scopes=repo&description=Blog+Admin" target="_blank" rel="noopener" style="color:var(--muted)">
            토큰 발급하기 →
          </a>
        </p>
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn" style="width:100%">로그인</button>
    </form>

    <p style="margin-top:20px; font-size:12px; color:var(--muted);">
      토큰은 sessionStorage에만 저장되며 브라우저 종료 시 삭제됩니다.
    </p>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/github.js"></script>
  <script>
    document.getElementById('siteTitle').textContent = `${CONFIG.BLOG_TITLE} Admin`;
    document.title = `Admin Login — ${CONFIG.BLOG_TITLE}`;

    // 이미 로그인된 경우 대시보드로 이동
    if (AUTH.isLoggedIn()) location.href = 'index.html';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn   = document.getElementById('submitBtn');
      const token = document.getElementById('token').value.trim();

      if (!token) return;

      btn.disabled = true;
      btn.textContent = '확인 중...';
      document.getElementById('msg').innerHTML = '';

      // 토큰을 임시 설정 후 GitHub API로 인증 확인
      AUTH.setToken(token);
      try {
        const user = await GITHUB.verifyToken();

        // 레포 접근 권한 확인
        if (CONFIG.GITHUB_OWNER !== 'your-username') {
          await GITHUB._api(`/repos/${CONFIG.GITHUB_OWNER}/${CONFIG.GITHUB_REPO}`);
        }

        // 인증 성공
        location.href = 'index.html';
      } catch (err) {
        AUTH.removeToken();
        UTILS.msg('msg', `인증 실패: ${err.message}. 토큰과 레포 접근 권한을 확인하세요.`);
        btn.disabled = false;
        btn.textContent = '로그인';
      }
    });
  </script>
</body>
</html>
